  <body>
    <nav class="navbar">
      <div class="nav-top">
        <a href="index.html" class="nav-logo">Branch Out Media</a>

  <script>
    var toggle = document.querySelector('.nav-toggle');
    if (toggle) {
      toggle.addEventListener('click', function() {
        var menu = document.querySelector('.nav-menu');
        menu.classList.toggle('open');
        // Shift main content so the expanded nav doesn't cover it
        var main = document.querySelector('main');
        if (main) {
          if (menu.classList.contains('open')) {
            main.style.marginTop = (document.querySelector('.navbar').offsetHeight) + 'px';
          } else {
            main.style.marginTop = '';
          }
        }
      });
    }
  </script>
